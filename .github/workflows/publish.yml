name: Publish NuGet Package

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          registry-url: 'https://nuget.pkg.github.com/ddicostanzo/index.json'
        env:
          NUGET_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Restore
        run: dotnet restore AriaAPI.sln

      - name: Build
        run: dotnet build AriaAPI.sln -c Release --no-restore

      - name: Test
        run: dotnet test AriaAPI.Tests/AriaAPI.Tests.csproj -c Release --no-build --verbosity normal

      - name: Extract version from tag
        run: echo "PKG_VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Pack
        run: dotnet pack AriaAPI/AriaAPI.csproj -c Release --no-build -p:Version=${{ env.PKG_VERSION }} -o ./out

      - name: Push to GitHub Packages
        run: |
          shopt -s nullglob
          files=(./out/*.nupkg)
          if [ ${#files[@]} -eq 0 ]; then
            echo "ERROR: No .nupkg files found in ./out/"
            exit 1
          fi
          dotnet nuget push "${files[@]}" --source github --api-key ${{ secrets.GITHUB_TOKEN }} --skip-duplicate
