name: Publish NuGet Package

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    env:
      NUGET_SOURCE_URL: https://nuget.pkg.github.com/ddicostanzo/index.json
      NUGET_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
          source-url: ${{ env.NUGET_SOURCE_URL }}
        env:
          NUGET_AUTH_TOKEN: ${{ env.NUGET_AUTH_TOKEN }}

      - name: Show .NET info
        run: dotnet --info

      - name: Clean
        run: dotnet clean AriaAPI.sln -c Release --disable-build-servers

      - name: Restore
        run: dotnet restore AriaAPI.sln --disable-build-servers

      - name: Build
        run: dotnet build AriaAPI.sln -c Release --no-restore --disable-build-servers -maxcpucount:1

      - name: Test
        run: dotnet test AriaAPI.Tests/AriaAPI.Tests.csproj -c Release --no-build --no-restore --verbosity normal

      - name: Extract version from tag
        run: echo "PKG_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Pack
        run: dotnet pack AriaAPI/AriaAPI.csproj -c Release --no-build -p:Version=${{ env.PKG_VERSION }} -o ./out

      - name: Push to GitHub Packages
        run: |
          shopt -s nullglob
          files=(./out/*.nupkg)

          if [ ${#files[@]} -eq 0 ]; then
            echo "ERROR: No .nupkg files found in ./out/"
            exit 1
          fi

          for file in "${files[@]}"; do
            echo "Pushing $file"
            dotnet nuget push "$file" \
              --source "${NUGET_SOURCE_URL}" \
              --api-key "${GITHUB_TOKEN}" \
              --skip-duplicate
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
