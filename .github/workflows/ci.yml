name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore AriaAPI.sln

    - name: Build
      run: dotnet build AriaAPI.sln --no-restore -c Release

    - name: Test
      run: dotnet test AriaAPI.Tests/AriaAPI.Tests.csproj --no-build -c Release --verbosity normal
